name: MeatCam
options:
  bundleIdPrefix: com.cain218
targets:
  MeatCam:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    scheme: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cain218.meatcam
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 4NJZYHZHLU
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "焼け具合を判定するためにカメラを使用します"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
